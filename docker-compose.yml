version: "3.9"

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: kz_house_price
    ports:
      - "8000:8000"
    environment:
      # Obtain a free API key at https://developer.tech.yandex.ru/
      - YANDEX_MAPS_API_KEY=${YANDEX_MAPS_API_KEY:-}
    restart: unless-stopped
    # Optional: mount data volumes so you can update files without rebuilding
    # volumes:
    #   - ./osm_shp:/app/osm_shp:ro
    #   - ./app/nn_model:/app/app/nn_model:ro
