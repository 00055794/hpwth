<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>KZ Real Estate Price Estimator</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.css" />
  <link rel="stylesheet" href="/static/css/style.css" />
</head>
<body>

<header class="app-header">
  <div class="header-title">KZ Real Estate Price Estimator</div>
  <div class="header-caption">Predict apartment prices in KZT and view them on the map. Upload your file or use the form.</div>
</header>

<main class="two-col">

  <!-- LEFT: Single Prediction -->
  <section class="col">

    <details class="expander" id="map-expander">
      <summary>Map</summary>
      <div class="expander-body">
        <div id="single-map"></div>
      </div>
    </details>

    <div class="card">
      <div class="form-2col">

        <div class="sub-col">
          <div class="form-group">
            <label for="ROOMS">Rooms</label>
            <input type="number" id="ROOMS" min="1" max="10" value="2" />
          </div>
          <div class="form-group">
            <label for="TOTAL_AREA">Area m2</label>
            <input type="number" id="TOTAL_AREA" step="0.1" min="10" max="1000" value="60" />
          </div>
          <div class="form-group">
            <label for="FLOOR">Floor</label>
            <input type="number" id="FLOOR" min="1" max="100" value="5" />
          </div>
          <div class="form-group">
            <label for="TOTAL_FLOORS">Total Floors</label>
            <input type="number" id="TOTAL_FLOORS" min="1" max="100" value="9" />
          </div>
        </div>

        <div class="sub-col">
          <div class="form-group">
            <label for="YEAR">Year</label>
            <input type="number" id="YEAR" min="1950" max="2100" value="2015" />
          </div>
          <div class="form-group">
            <label for="MATERIAL">Material</label>
            <select id="MATERIAL">
              <option value="3" selected>Monolithic (монолитный)</option>
              <option value="2">Panel (панельный)</option>
              <option value="4">Brick (кирпичный)</option>
              <option value="1">Other (иной)</option>
            </select>
          </div>
          <div class="form-group">
            <label for="FURNITURE">Furniture</label>
            <select id="FURNITURE">
              <option value="1">No furniture</option>
              <option value="2">Partial</option>
              <option value="3" selected>Full</option>
            </select>
          </div>
          <div class="form-group">
            <label for="CONDITION">Condition</label>
            <select id="CONDITION">
              <option value="1">Rough / Open plan (черновая)</option>
              <option value="2">Needs renovation (требует)</option>
              <option value="3">Neat / Average (аккуратный)</option>
              <option value="4">Good (хорошее)</option>
              <option value="5" selected>Fresh renovation (свежий)</option>
            </select>
          </div>
        </div>

      </div>

      <div class="form-2col coords-row">
        <div class="form-group">
          <label for="LATITUDE">Latitude</label>
          <input type="number" id="LATITUDE" step="0.000001" min="40" max="55" value="43.256700" />
        </div>
        <div class="form-group">
          <label for="LONGITUDE">Longitude</label>
          <input type="number" id="LONGITUDE" step="0.000001" min="46" max="87" value="76.928600" />
        </div>
      </div>

      <button id="predict-btn" class="btn-primary btn-full" onclick="runPredict()">
        Predict Price
      </button>
    </div>

    <div id="loading-card" class="loading-card hidden">
      <div class="spinner"></div>
      <span class="loading-text">Calculating...</span>
    </div>

    <div id="error-card" class="error-card hidden">
      <span id="error-msg"></span>
    </div>

    <div id="result-section" class="hidden">
      <div class="success-banner" id="price-banner"></div>
      <details class="expander">
        <summary>Details</summary>
        <div class="expander-body">
          <div class="table-scroll" id="details-table-wrap"></div>
        </div>
      </details>
    </div>

  </section>

  <!-- RIGHT: Batch Upload -->
  <section class="col">

    <div class="card upload-card">
      <label class="upload-zone" id="upload-zone">
        <div class="upload-title">Upload CSV / Excel</div>
        <div class="upload-hint">Drag and drop or click to browse</div>
        <input type="file" id="batch-file" accept=".csv,.xlsx" onchange="handleBatchUpload()" />
      </label>
    </div>

    <div class="btn-row">
      <button id="dl-csv-btn" class="btn-secondary" disabled onclick="downloadCSV()">Download CSV</button>
      <button id="dl-xlsx-btn" class="btn-secondary" disabled onclick="downloadXLSX()">Download Excel</button>
    </div>

    <div id="batch-loading" class="loading-card hidden">
      <div class="spinner"></div>
      <span class="loading-text">Processing batch...</span>
    </div>

    <div id="batch-results" class="hidden">
      <div class="success-banner" id="batch-banner"></div>
      <div class="table-scroll" id="batch-table-wrap"></div>
      <details class="expander" id="batch-map-expander">
        <summary>View on Map</summary>
        <div class="expander-body">
          <div id="batch-map"></div>
        </div>
      </details>
    </div>

    <details class="expander">
      <summary>Download Template</summary>
      <div class="expander-body">
        <div class="btn-row">
          <a href="/template/csv"  class="btn-secondary">CSV</a>
          <a href="/template/xlsx" class="btn-secondary">Excel</a>
        </div>
      </div>
    </details>

  </section>

</main>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.js"></script>
<script src="/static/js/app.js?v=2"></script>
</body>
</html>
